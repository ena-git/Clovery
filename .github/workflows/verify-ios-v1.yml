name: Verify Clovery Native iOS

"on":
  pull_request:
    paths:
      - ".github/workflows/verify-ios-v1.yml"
      - "Clovery/**"
      - "CloveryTests/**"
      - "CloveryWidget/**"
      - "Clovery.xcodeproj/**"
      - "CloveryWidgetExtension.entitlements"
      - "Tests/**"
      - "scripts/**"
      - "docs/release/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-ios-v1.yml"
      - "Clovery/**"
      - "CloveryTests/**"
      - "CloveryWidget/**"
      - "Clovery.xcodeproj/**"
      - "CloveryWidgetExtension.entitlements"
      - "Tests/**"
      - "scripts/**"
      - "docs/release/**"

permissions:
  contents: read

concurrency:
  group: verify-ios-v1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-ios:
    runs-on: macos-15
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.0.1.app/Contents/Developer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Reject beta Xcode
        run: |
          xcode_version=$(xcodebuild -version)
          selected_developer_dir=$(xcode-select -p)
          printf '%s\n' "$xcode_version"
          printf 'Selected developer directory: %s\n' "$selected_developer_dir"
          if printf '%s\n%s\n' "$xcode_version" "$selected_developer_dir" | grep -qi beta; then
            echo "Beta Xcode is not allowed for native iOS verification." >&2
            exit 1
          fi
      - name: Verify native iOS
        run: scripts/verify-ios-v1.sh
