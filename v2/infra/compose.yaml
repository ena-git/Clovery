name: clovery-v2

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: clovery
      POSTGRES_USER: clovery
      POSTGRES_PASSWORD: clovery_dev_only
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clovery -d clovery"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: clovery_minio
      MINIO_ROOT_PASSWORD: clovery_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
